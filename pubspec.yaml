name: playit_mobile
description: PlayIt Mobile — Multi-stem audio player
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  flutter_soloud: ^3.1.10
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  file_picker: ^8.1.2
  shared_preferences: ^2.3.2
  provider: ^6.1.2
  path: ^1.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/main_icon.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/main_icon.png"
  min_sdk_android: 21
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/
